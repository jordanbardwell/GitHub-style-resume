name = "jordan-bardwell-resume"
compatibility_date = "2025-01-01"

# Static-assets-only Worker: Cloudflare serves the built ./dist directory directly,
# no Worker script needed. `vite build` produces dist/, then `wrangler deploy` ships it.
[assets]
directory = "./dist"
# Unknown paths fall back to index.html (this is a single-page app).
not_found_handling = "single-page-application"
